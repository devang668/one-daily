---
layout: default
---
<a class="back-chip" href="{{ '/' | relative_url }}">返回首页</a>

<article class="post-article">
  <header class="post-hero">
    <p class="post-kicker">{{ page.date | date: "%Y.%m.%d" }}</p>
    <h1>{{ page.title }}</h1>
    <p class="post-summary">{{ site.description }}</p>
  </header>

  <div class="post-body">
    {{ content }}
  </div>
</article>
