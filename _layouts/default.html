<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; line-height: 1.6; }
    header { border-bottom: 1px solid #eee; padding-bottom: 10px; margin-bottom: 20px; }
    header a { text-decoration: none; color: #333; font-size: 1.5em; }
    .content { }
    footer { border-top: 1px solid #eee; padding-top: 10px; margin-top: 40px; color: #666; font-size: 0.9em; }
    img { max-width: 100%; height: auto; }
    pre { background: #f5f5f5; padding: 15px; overflow-x: auto; border-radius: 5px; }
    code { background: #f5f5f5; padding: 2px 5px; border-radius: 3px; }
    .post-list { list-style: none; padding: 0; }
    .post-list li { margin: 10px 0; }
    .post-list a { text-decoration: none; color: #0066cc; }
    .post-date { color: #999; font-size: 0.9em; }
    h1, h2, h3 { color: #333; }
  </style>
</head>
<body>
  <header>
    <a href="{{ '/' | relative_url }}">{{ site.title }}</a>
  </header>
  <div class="content">
    {{ content }}
  </div>
  <footer>
    <a href="{{ '/about' | relative_url }}">关于</a> | <a href="https://github.com/devang668" target="_blank">GitHub</a>
  </footer>
</body>
</html>
