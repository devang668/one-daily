<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }}</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; line-height: 1.6; }
    header { border-bottom: 1px solid #eee; padding-bottom: 10px; margin-bottom: 20px; }
    header a { text-decoration: none; color: #333; font-size: 1.5em; }
    .content { }
    footer { border-top: 1px solid #eee; padding-top: 10px; margin-top: 40px; color: #666; font-size: 0.9em; }
    img { max-width: 100%; height: auto; }
    pre { background: #f5f5f5; padding: 15px; overflow-x: auto; border-radius: 5px; }
    code { background: #f5f5f5; padding: 2px 5px; border-radius: 3px; }
    h1, h2, h3 { color: #333; }
    .back-link { margin-bottom: 20px; }
    .back-link a { color: #666; text-decoration: none; font-size: 0.9em; }
  </style>
</head>
<body>
  <header>
    <a href="/">{{ site.title }}</a>
  </header>
  <div class="content">
    <div class="back-link"><a href="/">← 返回首页</a></div>
    <article>
      <h1>{{ page.title }}</h1>
      <p class="post-date">{{ page.date | date: "%Y-%m-%d" }}</p>
      <div class="post-content">
        {{ content }}
      </div>
    </article>
  </div>
  <footer>
    <a href="/about">关于</a> | <a href="https://github.com/devang668" target="_blank">GitHub</a>
  </footer>
</body>
</html>
